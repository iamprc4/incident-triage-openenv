name: incident_triage_openenv
version: 0.1.0
description: Real-world IT incident triage environment for agent evaluation.
entrypoint:
  module: incident_triage_env
  class: IncidentTriageEnv
api:
  reset: /reset
  step: /step
  state: /state
tasks:
  - name: easy_password_reset
    difficulty: easy
    max_steps: 2
    grader: deterministic
  - name: medium_db_latency
    difficulty: medium
    max_steps: 3
    grader: deterministic
  - name: hard_security_breach
    difficulty: hard
    max_steps: 3
    grader: deterministic
action_space:
  type: object
  fields:
    summary: string
    category: enum[network,database,auth,billing,infra,security]
    priority: enum[low,medium,high,critical]
    owner_team: enum[sre,platform,db,security,support]
    runbook_steps: list[string]
    customer_message: string
observation_space:
  type: object
  fields:
    task_name: string
    ticket_id: string
    ticket_text: string
    context: object
    attempts_used: integer
    attempts_remaining: integer
    target_outcome: string
    feedback_signals: object
    last_action_error: string|null
